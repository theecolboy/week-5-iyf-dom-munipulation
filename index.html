<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephen Ndungu Kamande | To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="todo-app" aria-labelledby="app-title">
            <header class="app-header">
                <p class="eyebrow">Week 5 DOM Manipulation</p>
                <h1 id="app-title">Stephen Ndungu Kamande's To-Do List</h1>
                <p class="intro">Add, complete, edit, filter, and clear tasks with JavaScript DOM events.</p>
            </header>

            <form id="todo-form" class="todo-form">
                <label class="sr-only" for="todo-input">New task</label>
                <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required>
                <button type="submit">Add</button>
            </form>

            <div class="filters" aria-label="Filter tasks">
                <button class="filter active" type="button" data-filter="all">All</button>
                <button class="filter" type="button" data-filter="active">Active</button>
                <button class="filter" type="button" data-filter="completed">Completed</button>
            </div>

            <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

            <footer class="stats">
                <span id="items-left">0 items left</span>
                <button id="clear-completed" type="button">Clear Completed</button>
            </footer>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
